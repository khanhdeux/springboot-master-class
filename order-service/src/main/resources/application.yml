server:
  port: 8081

spring:
  application:
    name: order-service

# Resilience4j Konfiguration
resilience4j:
  circuitbreaker:
    instances:
      userServiceBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      userServiceRetry:
        maxAttempts: 3
        waitDuration: 2s # Zeit zwischen den Versuchen für Jaeger-Analyse