server:
  port: 8081

spring:
  application:
    name: order-service
  cloud:
    stream:
      binders:
        my-kafka:
          type: kafka
          environment:
            spring.cloud.stream.kafka.binder.brokers: kafka:9092
        my-rabbit:
          type: rabbit
          environment:
            spring.rabbitmq.addresses: rabbitmq:5672

      bindings:
        # AUSGANG (out)
        orderSignal-out-0:
          destination: rabbit-orders
          binder: my-rabbit
        tradingAnalytics-out-0:
          destination: kafka-trading-log
          binder: my-kafka

# Resilience4j Konfiguration
resilience4j:
  circuitbreaker:
    instances:
      userServiceBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      userServiceRetry:
        maxAttempts: 3
        waitDuration: 2s # Zeit zwischen den Versuchen für Jaeger-Analyse