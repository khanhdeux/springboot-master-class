global:
  scrape_interval: 5s 

scrape_configs:
  - job_name: 'order-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['springboot-master-class-order-service-1:8081']
        labels:
          application: 'order-service'

  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['springboot-master-class-user-service-1:8080']
        labels:
          application: 'user-service'