version: '3.8'

services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4318:4318"
    networks:
      - tracing-network

  user-service:
    build: ./user-service
    ports:
      - "8080:8080"
    environment:
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://jaeger:4318/v1/traces
      - SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS=kafka:9092
      - SPRING_RABBITMQ_ADDRESSES=rabbitmq:5672
    depends_on:
      - jaeger
      - kafka
      - rabbitmq
    networks:
      - tracing-network

  order-service:
    build: ./order-service
    ports:
      - "8081:8081"
    environment:
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://jaeger:4318/v1/traces
      - SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS=kafka:9092
      - SPRING_RABBITMQ_ADDRESSES=rabbitmq:5672
    depends_on:
      - jaeger
      - kafka
      - rabbitmq
    networks:
      - tracing-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    ports:
      - "9200:9200"    
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false            # Deaktiviert die Anmeldung
      - xpack.security.enrollment.enabled=false # Verhindert die Token-Abfrage
      - xpack.security.http.ssl.enabled=false   # Deaktiviert HTTPS (wichtig für Codespaces)
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    networks:
      - tracing-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.1
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    # Logstash braucht eine Konfiguration, wie es die Daten von Spring empfängt
    command: >
      bash -c "echo 'input { tcp { port => 5044 codec => json } } output { elasticsearch { hosts => [\"http://elasticsearch:9200\"] index => \"springboot-logs-%{+YYYY.MM.dd}\" } }' > /usr/share/logstash/pipeline/logstash.conf && /usr/share/logstash/bin/logstash"
    networks:
      - tracing-network
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - tracing-network
    depends_on:
      - elasticsearch

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - tracing-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - tracing-network
      
  # RabbitMQ für schnelle Aufgaben (Queues)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - tracing-network

  # Kafka für Event-Streaming (Logs)
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - tracing-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - tracing-network

  localstack:
    image: localstack/localstack:3
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs,sns,cloudformation,secretsmanager
      - DEFAULT_REGION=eu-central-1
      - DEBUG=0
    networks:
      - tracing-network      

networks:
  tracing-network:
    driver: bridge